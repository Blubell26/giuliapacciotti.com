<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog | Giulia Pacciotti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--peach:#e8956d;--dark:#1c1c1a;--mid:#4a4a46;--soft:#999990;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#fff;color:var(--dark);}
.topbar{padding:1.5rem 2rem;border-bottom:1px solid #ebebeb;}
.topbar a{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:var(--dark);text-decoration:none;}
.wrap{max-width:680px;margin:0 auto;padding:4rem 1.5rem 6rem;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,2.8rem);font-weight:300;margin-bottom:2.5rem;}
.post-card{display:block;padding:2rem 0;border-bottom:1px solid #ebebeb;text-decoration:none;color:inherit;}
.post-card-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:400;color:var(--dark);margin-bottom:0.5rem;}
.post-card-date{font-size:0.78rem;color:var(--soft);margin-bottom:0.8rem;}
.post-card-excerpt{font-size:0.95rem;line-height:1.7;color:var(--mid);font-weight:300;}
</style>
</head>
<body>
<div class="topbar"><a href="/">Giulia Pacciotti</a></div>
<div class="wrap">
<h1 class="page-title">From the blog</h1>
{% for post in site.posts %}
<a href="{{ post.url }}" class="post-card">
<h2 class="post-card-title">{{ post.title }}</h2>
<p class="post-card-date">{{ post.date | date: "%B %-d, %Y" }}</p>
<p class="post-card-excerpt">{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
</a>
{% endfor %}
</div>
</body>
</html>
