<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Mark Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Cormorant Garamond', serif; }

.preview-card {
width: 100%;
height: 100vh;
background-image: url(‘IMG_7150.png’);
background-size: cover;
background-position: center;
display: flex;
align-items: center;
justify-content: center;
}

.mark {
display: flex;
flex-direction: column;
align-items: center;
}

.line {
font-family: ‘Cormorant Garamond’, serif;
font-weight: 300;
font-size: clamp(20px, 5vw, 32px);
letter-spacing: 12px;
text-transform: uppercase;
color: #fffdf7;
text-shadow: 0 1px 12px rgba(0,0,0,0.4);
line-height: 1;
}

.mandala {
width: clamp(80px, 16vw, 120px);
height: clamp(80px, 16vw, 120px);
object-fit: contain;
margin: 12px 0;
mix-blend-mode: screen;
}
</style>

</head>
<body>

<div class="preview-card">
  <div class="mark">
    <span class="line">Keepers of the</span>
    <img src="IMG_7248.png" alt="mandala" class="mandala">
    <span class="line">Wild Heart</span>
  </div>
</div>

</body>
</html>
