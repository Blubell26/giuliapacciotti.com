<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Mark Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f0eb; font-family: 'Cormorant Garamond', serif; padding: 40px 20px; }

.label {
text-align: center;
font-size: 11px;
letter-spacing: 3px;
text-transform: uppercase;
font-family: sans-serif;
color: #aaa;
margin-bottom: 16px;
}

.preview-card {
max-width: 700px;
margin: 0 auto 60px;
background-image: url(‘IMG_7150.png’);
background-size: cover;
background-position: center;
border-radius: 4px;
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
height: 240px;
}

.mark {
display: flex;
flex-direction: column;
align-items: center;
}

.line {
font-family: ‘Cormorant Garamond’, serif;
font-weight: 300;
font-size: clamp(18px, 4vw, 28px);
letter-spacing: 10px;
text-transform: uppercase;
color: #fffdf7;
text-shadow: 0 1px 10px rgba(0,0,0,0.35);
line-height: 1;
}

.mandala {
width: clamp(70px, 14vw, 100px);
height: clamp(70px, 14vw, 100px);
object-fit: contain;
margin: 10px 0;
filter: drop-shadow(0 1px 6px rgba(0,0,0,0.25));
}
</style>

</head>
<body>

<p class="label">Keepers of the Wild Heart — Brand Mark</p>

<div class="preview-card">
  <div class="mark">
    <span class="line">Keepers of the</span>
    <img src="IMG_7248.png" alt="mandala" class="mandala">
    <span class="line">Wild Heart</span>
  </div>
</div>

</body>
</html>
