<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Mark Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Cormorant Garamond', serif; background: #ffffff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

.mark {
display: flex;
flex-direction: column;
align-items: center;
}

.line {
font-family: ‘Cormorant Garamond’, serif;
font-weight: 400;
font-size: clamp(22px, 5vw, 34px);
letter-spacing: 10px;
text-transform: uppercase;
color: #ffffff;
-webkit-text-stroke: 0.8px #1c1c1a;
line-height: 1;
}

.mandala-wrap {
position: relative;
margin: 14px 0;
display: flex;
align-items: center;
justify-content: center;
width: clamp(90px, 18vw, 130px);
height: clamp(90px, 18vw, 130px);
}

.divider {
width: 260px;
height: 1.5px;
background: linear-gradient(to right, #2d6b6b, #e8956d);
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
z-index: 0;
}

.mandala {
width: 100%;
height: 100%;
object-fit: contain;
position: relative;
z-index: 1;
}
</style>

</head>
<body>
  <div class="mark">
    <span class="line">Keepers of the</span>
    <div class="mandala-wrap">
      <div class="divider"></div>
      <img src="IMG_7248.png" alt="mandala" class="mandala">
    </div>
    <span class="line">Wild Heart</span>
  </div>
</body>
</html>
