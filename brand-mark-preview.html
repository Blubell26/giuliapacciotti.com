<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Mark Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Cormorant Garamond', serif; background: #ffffff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

.mark {
display: flex;
flex-direction: column;
align-items: center;
}

.line {
font-family: ‘Cormorant Garamond’, serif;
font-weight: 400;
font-size: clamp(22px, 5vw, 34px);
letter-spacing: 10px;
text-transform: uppercase;
color: #ffffff;
-webkit-text-stroke: 0.8px #2d6b6b;
line-height: 1;
}

.mandala {
width: clamp(90px, 18vw, 130px);
height: clamp(90px, 18vw, 130px);
object-fit: contain;
margin: 14px 0;
}
</style>

</head>
<body>
  <div class="mark">
    <span class="line">Keepers of the</span>
    <img src="IMG_7248.png" alt="mandala" class="mandala">
    <span class="line">Wild Heart</span>
  </div>
</body>
</html>
